apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: mariadb-weekend-primary-cpu-stress
  namespace: chaos-mesh
spec:
  schedule: "0 4 * * 6,0"
  historyLimit: 2
  concurrencyPolicy: "Forbid"
  type: "StressChaos"
  stressChaos:
    mode: one
    selector:
      namespaces:
        - demo
      labelSelectors:
        "app.kubernetes.io/instance": "md"
        "kubedb.com/role": "Primary"
    stressors:
      cpu:
        workers: 1
        load: 90
    duration: "30m"
