apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: md-master-pod-failure
  namespace: chaos-mesh
spec:
  action: pod-failure
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Master"
  duration: "90s"
