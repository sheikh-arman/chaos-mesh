apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: md-master-cpu-stress
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Master"
  stressors:
    cpu:
      workers: 2
      load: 98
  duration: "90s"
