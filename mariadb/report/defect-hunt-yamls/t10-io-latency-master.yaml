apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: md-master-io-latency
  namespace: chaos-mesh
spec:
  action: latency
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Master"
  volumePath: /var/lib/mysql
  path: "/**"
  delay: "100ms"
  percent: 100
  duration: "2m"
  containerNames:
    - mariadb
