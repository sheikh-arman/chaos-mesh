apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: md-slave-pod-kill
  namespace: chaos-mesh
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Slave"
  gracePeriod: 0
