apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: md-slave-memory-stress
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Slave"
  stressors:
    memory:
      workers: 2
      size: "1400MB"
  duration: "2m"
