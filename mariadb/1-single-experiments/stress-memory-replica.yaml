apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: mariadb-replica-memory-stress
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
#      "kubedb.com/role": "Master"
      "kubedb.com/role": "Master"
  stressors:
    memory:
      workers: 1
      size: "800MB"
  duration: "20m"
