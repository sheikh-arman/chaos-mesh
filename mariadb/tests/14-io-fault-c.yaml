apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: mariadb-io-fault-high-percent
  namespace: chaos-mesh
spec:
  action: fault
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "md"
      "kubedb.com/role": "Master"
  volumePath: /var/lib/mysql
  path: /var/lib/mysql/**/*
  errno: 5
  percent: 100
  duration: "2m"
  containerNames:
    - mariadb