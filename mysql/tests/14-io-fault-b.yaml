apiVersion: chaos-mesh.org/v1alpha1
kind: IOChaos
metadata:
  name: mysql-io-fault-all
  namespace: chaos-mesh
spec:
  action: fault
  mode: all
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "mysql-ha-cluster"
  volumePath: /var/lib/mysql
  path: /var/lib/mysql/**/*
  errno: 5
  percent: 25
  duration: "2m"
  containerNames:
    - mysql