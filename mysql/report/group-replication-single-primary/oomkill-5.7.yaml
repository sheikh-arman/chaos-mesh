apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: mysql-oomkill-single-primary-5.7
  namespace: chaos-mesh
spec:
  mode: one
  selector:
    namespaces:
      - demo
    labelSelectors:
      "app.kubernetes.io/instance": "mysql-ha-cluster"
  stressors:
    memory:
      workers: 2
      size: "1200MB"
  duration: "10m"
